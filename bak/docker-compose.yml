version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: travelmap-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-3001}
      # DB_* variables are taken from .env (DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME)
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    networks:
      - travelmap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "
        if [ '$NODE_ENV' = 'development' ]; then
          npm run start:dev
        else
          npm run start:prod
        fi
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: travelmap-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      PUBLIC_MAPTILER_API_KEY: ${MAPTILER_API_KEY:-}
      PUBLIC_APP_NAME: TravelMap
      PUBLIC_APP_VERSION: 1.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-8778}:5173"
    networks:
      - travelmap-network
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c "
        if [ '$NODE_ENV' = 'development' ]; then
          npm run dev -- --host 0.0.0.0 --port 5173
        else
          cp -r build/* /usr/share/nginx/html/
          nginx -g 'daemon off;'
        fi
      "

volumes:
  uploads_data:
    driver: local

networks:
  travelmap-network:
    driver: bridge