version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: travelmap-backend-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-3001}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_dev_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    networks:
      - travelmap-dev-network
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: travelmap-frontend-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      PUBLIC_MAPTILER_API_KEY: ${MAPTILER_API_KEY:-}
      PUBLIC_APP_NAME: TravelMap
      PUBLIC_APP_VERSION: 1.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - travelmap-dev-network
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  uploads_dev_data:
    driver: local

networks:
  travelmap-dev-network:
    driver: bridge