# TravelMap Production - Uses shared postgres
version: '3.8'

services:
  # Backend API - NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: travelmap-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: travelmap
      DB_PASSWORD: travelmap_secret
      DB_NAME: travelmap
      JWT_SECRET: tm-prod-jwt-key-x9k2m4p7q
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: https://travelmap.custombots.es
    volumes:
      - travelmap_uploads:/app/uploads
    networks:
      - travelmap-net
      - postgres-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Frontend - SvelteKit (nginx serving static build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: travelmap-frontend
    restart: unless-stopped
    ports:
      - "8778:5173"
    networks:
      - travelmap-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  travelmap_uploads:
    driver: local

networks:
  travelmap-net:
    driver: bridge
  postgres-net:
    external: true
    name: postgres-vector_default
